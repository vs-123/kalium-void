name: BUILD KALIUM VOID ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: CHECKOUT KALIUM REPO
        uses: actions/checkout@v4

      - name: INSTALL DEPENDENCIES & SETUP XBPS
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support wget liblz4-tool xz-utils

          wget https://repo-default.voidlinux.org/static/xbps-static-latest.aarch64-musl.tar.xz
          mkdir xbps
          tar xvf xbps-static-latest.aarch64-musl.tar.xz -C xbps
          sudo cp xbps/usr/bin/xbps-* /usr/bin/

      - name: CLONE VOID-MKLIVE
        run: git clone --depth 1 https://github.com/void-linux/void-mklive.git

      - name: BUILD ISO (AARCH64)
        working-directory: .
        run: |
          bash ./build.sh aarch64

      - name: GENERATE CHECKSUM & RENAME
        run: |
          TAG_NAME="${{ github.ref_name }}"
          sha256sum kalium-void-aarch64.iso > kalium-void-aarch64-sha256sum.txt
          mv kalium-void-aarch64.iso "kalium-void-aarch64-${TAG_NAME}.iso"

      - name: CREATE RELEASE AND UPLOAD ASSET
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kalium-void-aarch64*.iso
            *sha256sum.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
