name: BUILD KALIUM VOID ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: CHECKOUT KALIUM-VOID REPO
        uses: actions/checkout@v4

      - name: CHECKOUT KALIUM-REPO REPO
        uses: actions/checkout@v4
        with:
          repository: vs-123/kalium-repo
          path: kalium-repo

      - name: INSTALL DEPENDENCIES
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support wget liblz4-tool xz-utils

      - name: SETUP XBPS
        run: |
          wget https://repo-default.voidlinux.org/static/xbps-static-latest.aarch64-musl.tar.xz
          mkdir xbps
          tar xvf xbps-static-latest.aarch64-musl.tar.xz -C xbps
          sudo cp xbps/usr/bin/xbps-* /usr/bin/

      - name: BUILD CUSTOM PACKAGES (AARCH64)
        working-directory: kalium-repo
        run: |
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          unshare -rn ./xbps-src binary-bootstrap
          unshare -rn ./xbps-src pkg kalium-base-files
          unshare -rn ./xbps-src pkg kalium-base-systems
          xbps-rindex -a hostdir/binpkgs/*.xbps

      - name: CLONE VOID-MKLIVE
        run: git clone --depth 1 https://github.com/void-linux/void-mklive.git

      - name: BUILD ISO (AARCH64)
        working-directory: .
        run: |
          sed -i 's/umount -R -f/umount -l -R -f/g' ./void-mklive/mklive.sh
          bash ./build.sh aarch64

      - name: GENERATE CHECKSUM & RENAME
        run: |
          TAG_NAME="${{ github.ref_name }}"
          sha256sum kalium-void-aarch64.iso > kalium-void-aarch64-sha256sum.txt
          mv kalium-void-aarch64.iso "kalium-void-aarch64-${TAG_NAME}.iso"

      - name: CREATE RELEASE AND UPLOAD ASSET
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kalium-void-aarch64*.iso
            *sha256sum.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
